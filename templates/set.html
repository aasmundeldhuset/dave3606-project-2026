<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lego set</title>
        <style>
            body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
            table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
            th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
            th { font-weight: 600; }
            #error { color: red; }
        </style>
    </head>
    <body>
        <h1>Lego set</h1>
        <div id="error"></div>
        <p><strong>Set id:</strong> <span id="setId"></span></p>
        <p><strong>Set name:</strong> <span id="setName"></span></p>
        <p><strong>Year:</strong> <span id="setYear"></span></p>
        <p><strong>Category:</strong> <span id="setCategory"></span></p>
        <p><img id="setPreviewImage" alt="Set preview" style="max-width: 220px; display: none;"></p>
        <table>
            <thead><tr><th>Image</th><th>Brick type</th><th>Color</th><th>Count</th></tr></thead>
            <tbody id="inventory"></tbody>
        </table>
        <script>
            const urlParameters = new URLSearchParams(document.location.search);
            const setId = urlParameters.get("id");
            if (!setId) {
                document.getElementById("error").textContent = "Missing set id in URL.";
                throw new Error("Missing set id");
            }

            fetch(`/api/set?id=${setId}`)
                .then(function(setData) {
                    if (!setData.ok) {
                        throw new Error("Server returned status " + setData.status);
                    }
                    return setData.json();
                })
                .then(function(setJson) {
                    const setInfo = setJson.set;
                    document.getElementById("setId").textContent = setInfo.id;
                    document.getElementById("setName").textContent = setInfo.name;
                    document.getElementById("setYear").textContent = setInfo.year === null ? "unknown" : String(setInfo.year);
                    document.getElementById("setCategory").textContent = setInfo.category === null ? "unknown" : setInfo.category;

                    const setPreviewImage = document.getElementById("setPreviewImage");
                    if (setInfo.previewImageUrl) {
                        setPreviewImage.src = setInfo.previewImageUrl;
                        setPreviewImage.style.display = "block";
                    }

                    const inventoryTable = document.getElementById("inventory");
                    setJson.inventory.forEach(function(item) {
                        const inventoryRow = document.createElement("tr");

                        const imageCell = document.createElement("td");
                        if (item.previewImageUrl) {
                            const image = document.createElement("img");
                            image.src = item.previewImageUrl;
                            image.alt = item.name;
                            image.width = 48;
                            image.height = 48;
                            imageCell.appendChild(image);
                        } else {
                            imageCell.textContent = "-";
                        }

                        const brickTypeCell = document.createElement("td");
                        brickTypeCell.textContent = item.brickTypeId;

                        const colorCell = document.createElement("td");
                        colorCell.textContent = String(item.colorId);

                        const countCell = document.createElement("td");
                        countCell.textContent = String(item.count);

                        inventoryRow.appendChild(imageCell);
                        inventoryRow.appendChild(brickTypeCell);
                        inventoryRow.appendChild(colorCell);
                        inventoryRow.appendChild(countCell);
                        inventoryTable.appendChild(inventoryRow);
                    });
                })
                .catch(function(err) {
                    document.getElementById("error").textContent = "Failed to load data: " + err;
                });
        </script>
    </body>
</html>
